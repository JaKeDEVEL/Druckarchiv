<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Druckarchiv – Promo-Motiv</title>
    <style>
      * { box-sizing: border-box; }

      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #091114;
      }

      html,
      body {
        width: 1200px;
        height: 1200px;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        background:
          linear-gradient(180deg, rgba(4, 12, 14, 0.06), rgba(4, 12, 14, 0.88)),
          url("./promo-background.png") center / cover no-repeat;
        color: #f5f8f7;
      }

      body::before {
        position: absolute;
        inset: 0;
        content: "";
        background:
          radial-gradient(circle at 18% 12%, rgba(82, 215, 189, 0.11), transparent 30%),
          linear-gradient(90deg, rgba(4, 13, 15, 0.86) 0%, rgba(4, 13, 15, 0.36) 62%, rgba(4, 13, 15, 0.08));
      }

      .canvas {
        position: relative;
        display: grid;
        grid-template-rows: auto 1fr auto;
        width: 100%;
        height: 100%;
        padding: 72px 74px 66px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .icon {
        width: 112px;
        height: 112px;
        border-radius: 26px;
        filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.38));
      }

      .wordmark small,
      .eyebrow,
      .pill {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .wordmark small {
        display: block;
        margin-bottom: 7px;
        color: #52d7bd;
        font-size: 16px;
        font-weight: 800;
      }

      .wordmark strong {
        display: block;
        font-size: 44px;
        font-weight: 900;
        letter-spacing: -0.055em;
        line-height: 0.95;
      }

      .wordmark strong span { color: #ff9952; }

      .copy {
        align-self: center;
        width: 760px;
        margin-top: -34px;
      }

      .eyebrow {
        margin-bottom: 19px;
        color: #73e2cb;
        font-size: 18px;
        font-weight: 800;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: 84px;
        font-weight: 930;
        letter-spacing: -0.065em;
        line-height: 0.91;
        text-wrap: balance;
      }

      h1 em {
        color: #ff9952;
        font-style: normal;
      }

      .subline {
        max-width: 680px;
        margin: 26px 0 0;
        color: #c5d2cf;
        font-size: 25px;
        font-weight: 540;
        line-height: 1.35;
      }

      .footer {
        display: grid;
        grid-template-columns: 1fr 660px;
        align-items: end;
        gap: 26px;
      }

      .benefits {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding-bottom: 9px;
      }

      .pill {
        padding: 11px 15px;
        border: 1px solid rgba(82, 215, 189, 0.38);
        border-radius: 999px;
        background: rgba(8, 23, 25, 0.76);
        color: #b8c8c5;
        font-size: 13px;
        font-weight: 800;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }

      .pill:first-child {
        border-color: rgba(255, 153, 82, 0.55);
        color: #ffd0ad;
      }

      .app-shot {
        position: relative;
        height: 392px;
        overflow: hidden;
        border: 1px solid rgba(109, 226, 202, 0.42);
        border-radius: 25px;
        background: #081113;
        box-shadow:
          0 36px 72px rgba(0, 0, 0, 0.58),
          0 0 60px rgba(82, 215, 189, 0.1);
        transform: rotate(-1.2deg);
        transform-origin: bottom right;
      }

      .app-shot::before {
        position: absolute;
        z-index: 2;
        inset: 0;
        content: "";
        pointer-events: none;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
      }

      .app-shot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }

      .platform {
        position: absolute;
        right: 76px;
        top: 78px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 11px;
        background: rgba(7, 17, 20, 0.68);
        color: #e7eeec;
        font-size: 15px;
        font-weight: 700;
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <header class="brand">
        <img class="icon" src="./druckarchiv-icon.svg" alt="" />
        <div class="wordmark">
          <small>Lokale Modellbibliothek</small>
          <strong>DRUCK<span>ARCHIV</span></strong>
        </div>
      </header>

      <section class="copy">
        <div class="eyebrow">Deine Dateien. Deine Ordnung.</div>
        <h1>3D-DRUCK.<br /><em>ENDLICH</em> IM GRIFF.</h1>
        <p class="subline">STL, 3MF, OBJ und G-Code lokal organisieren, filtern und direkt in 3D betrachten.</p>
      </section>

      <footer class="footer">
        <div class="benefits">
          <span class="pill">Privat &amp; ohne Cloud</span>
          <span class="pill">Mehrere Ordner</span>
          <span class="pill">Interaktiver 3D-Viewer</span>
        </div>
        <div class="app-shot">
          <img src="../../docs/screenshots/projektuebersicht.png" alt="Druckarchiv Projektübersicht" />
        </div>
      </footer>

      <div class="platform">für macOS + Windows</div>
    </main>
  </body>
</html>
