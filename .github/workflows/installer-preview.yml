name: Release installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS Universal
            bundle: dmg
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            artifact: Druckarchiv-macOS
            path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - os: windows-latest
            label: Windows x64
            bundle: nsis
            target: ""
            rust_targets: ""
            artifact: Druckarchiv-Windows
            path: |
              src-tauri/target/release/bundle/nsis/*-setup.exe
              src-tauri/target/release/bundle/nsis/*-setup.exe.sig
          - os: ubuntu-22.04
            label: Linux x64
            bundle: deb,appimage
            target: ""
            rust_targets: ""
            artifact: Druckarchiv-Linux-x64
            path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/deb/*.deb.sig
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - name: Select stable Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install macOS Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget file libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run check:privacy
      - name: Verify updater signing configuration
        shell: bash
        run: |
          node -e "const c=require('./src-tauri/tauri.conf.json');const key=c.plugins?.updater?.pubkey||'';if(!key||key.includes('REPLACE_WITH')){console.error('Der öffentliche Updater-Schlüssel ist noch nicht konfiguriert.');process.exit(1)}"
          test -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: node -e "const expected=process.env.GITHUB_REF_NAME.replace(/^v/,'');const actual=require('./package.json').version;if(actual!==expected){console.error('Tag '+expected+' passt nicht zur App-Version '+actual);process.exit(1)}"
      - name: Build installer
        shell: bash
        env:
          CI: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --bundles "${{ matrix.bundle }}" --target "${{ matrix.target }}"
          else
            npm run tauri build -- --bundles "${{ matrix.bundle }}"
          fi
      - name: Sign Debian updater package
        if: runner.os == 'Linux'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          while IFS= read -r -d '' package; do
            npm run tauri signer sign -- "$package"
          done < <(find src-tauri/target/release/bundle/deb -type f -name '*.deb' -print0)
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14
      - name: Attest public build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: ${{ matrix.path }}

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_NOTES: |
        Druckarchiv is a local desktop app for organizing 3D-printing files.

        New in version 0.8.9: Druckarchiv checks for new versions quietly at startup. Available updates are shown inside the app, downloaded as signed packages, installed with visible progress, and completed by restarting the app. A manual update check is also available in the app menu.

        The updater supports macOS, Windows, Linux AppImage, and Linux Debian packages. Every update package is cryptographically verified before installation. Private signing keys are never stored in the repository.

        --- Deutsche Übersetzung ---

        Neu in Version 0.8.9: Druckarchiv prüft beim Start unaufdringlich auf neue Versionen. Verfügbare Updates werden in der App angezeigt, signiert heruntergeladen, mit sichtbarem Fortschritt installiert und durch einen Neustart abgeschlossen. Eine manuelle Prüfung befindet sich zusätzlich im App-Menü.

        Der Updater unterstützt macOS, Windows sowie Linux als AppImage und Debian-Paket. Jedes Update-Paket wird vor der Installation kryptografisch geprüft. Private Signierschlüssel liegen niemals im Repository.

        Note / Hinweis: v0.8.8 must be replaced manually once because it does not contain the updater yet. / v0.8.8 muss einmalig manuell ersetzt werden, da diese Version den Updater noch nicht enthält.

        The installers are not yet code-signed with paid Apple or Windows developer certificates, so the operating system may show a warning on first launch. / Die Installer sind noch nicht mit kostenpflichtigen Apple- oder Windows-Entwicklerzertifikaten signiert; beim ersten Start kann deshalb eine Sicherheitswarnung erscheinen.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create signed updater manifest
        run: node scripts/create-update-manifest.mjs --assets release-assets --repository "$GITHUB_REPOSITORY" --tag "$GITHUB_REF_NAME" --version "$GITHUB_REF_NAME"
      - name: Create release and attach installers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Druckarchiv $GITHUB_REF_NAME"
          release_flags=(--latest)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            title="$title (Preview)"
            release_flags=(--prerelease)
          fi
          mapfile -d '' release_assets < <(find release-assets -type f -print0)
          if (( ${#release_assets[@]} == 0 )); then
            echo "Keine Installer zum Veröffentlichen gefunden."
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${release_assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            "${release_flags[@]}" \
            --title "$title" \
            --notes "$RELEASE_NOTES"
