name: Release installers

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS Universal
            bundle: dmg
            target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin x86_64-apple-darwin
            artifact: Druckarchiv-macOS
            path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - os: windows-latest
            label: Windows x64
            bundle: nsis
            target: ""
            rust_targets: ""
            artifact: Druckarchiv-Windows
            path: src-tauri/target/release/bundle/nsis/*-setup.exe
          - os: ubuntu-22.04
            label: Linux x64
            bundle: deb,appimage
            target: ""
            rust_targets: ""
            artifact: Druckarchiv-Linux-x64
            path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm
      - name: Select stable Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - name: Install macOS Rust targets
        if: matrix.rust_targets != ''
        run: rustup target add ${{ matrix.rust_targets }}
      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential curl wget file libwebkit2gtk-4.1-dev libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run check:privacy
      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: node -e "const expected=process.env.GITHUB_REF_NAME.replace(/^v/,'');const actual=require('./package.json').version;if(actual!==expected){console.error('Tag '+expected+' passt nicht zur App-Version '+actual);process.exit(1)}"
      - name: Build installer
        shell: bash
        env:
          CI: "true"
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --bundles "${{ matrix.bundle }}" --target "${{ matrix.target }}"
          else
            npm run tauri build -- --bundles "${{ matrix.bundle }}"
          fi
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
          retention-days: 14
      - name: Attest public build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: ${{ matrix.path }}

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Create release and attach installers
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: |
            Druckarchiv ist eine lokal arbeitende Desktop-App zur Organisation von 3D-Druck-Dateien.

            Enthalten sind mehrere Bibliotheksordner, frei wählbare Dateitypen, dynamische KPI-Filter, Ausschlussregeln, Raster- und Listenansicht sowie lokale Vorschaubilder. STL-, 3MF- und OBJ-Dateien lassen sich direkt im interaktiven 3D-Viewer drehen, zoomen und verschieben. Blender wird nicht benötigt.

            Neu in Version 0.8.6: Druckdateien lassen sich jetzt auch in der normalen Raster- und Listenansicht auswählen und direkt an OrcaSlicer, Bambu Studio oder PrusaSlicer übergeben. Die interaktive Modellvorschau öffnet sich als kompaktes Fenster und bietet dieselbe Slicer-Aktion. Zusätzlich gibt es einen hellen Modus sowie die automatische Systemdarstellung.

            Erstmals stehen Linux-Pakete für x64 bereit: ein installierbares Debian-Paket und ein portables AppImage. Unter Linux erkennt Druckarchiv native sowie über Flatpak installierte Versionen der unterstützten Slicer.

            Hinweis: Die Installer sind noch nicht mit einem kostenpflichtigen Apple- beziehungsweise Windows-Entwicklerzertifikat signiert. Das Betriebssystem kann deshalb beim ersten Start eine Sicherheitswarnung anzeigen.

            Lizenz: kostenlose unveränderte, nichtkommerzielle Nutzung. Änderungen, Weiterveröffentlichung und kommerzielle Nutzung sind nicht gestattet.
        run: |
          title="Druckarchiv $GITHUB_REF_NAME"
          release_flags=(--latest)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            title="$title (Preview)"
            release_flags=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            "${release_flags[@]}" \
            --title "$title" \
            --notes "$RELEASE_NOTES"
