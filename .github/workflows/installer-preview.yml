name: Installer preview

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: dmg
            artifact: Druckarchiv-macOS
            path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            bundle: nsis
            artifact: Druckarchiv-Windows
            path: src-tauri/target/release/bundle/nsis/*-setup.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Select stable Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - run: npm ci
      - run: npm run check:privacy
      - name: Build installer
        run: npm run tauri build -- --bundles ${{ matrix.bundle }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error
      - name: Attest public build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: ${{ matrix.path }}
